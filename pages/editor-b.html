<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rich Text Editor B</title>
    <link rel="stylesheet" href="../css/editor.css" />
  </head>
  <body>
    <div class="editor-container">
      <div class="editor-header">
        <div class="editor-title">
          <span class="editor-title__dot"></span>
          <span>Editor B</span>
        </div>
        <div id="syncStatus" class="sync-status">In Sync</div>
      </div>

      <div class="toolbar">
        <button id="boldBtn" class="toolbar-btn" title="Bold (Ctrl+B)">
          <strong>B</strong>
        </button>
        <button id="italicBtn" class="toolbar-btn" title="Italic (Ctrl+I)">
          <em>I</em>
        </button>
        <button id="strikeBtn" class="toolbar-btn" title="StrikeThrough">
          <s>S</s>
        </button>
      </div>

      <div id="editor" class="editor" contenteditable="true">
        <p>Start typing to see real-time sync in action...</p>
      </div>
    </div>

    <script src="../js/editor.js"></script>
  </body>
</html>
