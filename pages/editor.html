<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rich Text Editor</title>
    <link rel="stylesheet" href="../css/editor.css" />
  </head>
  <body>
    <div class="editor-container">
      <div class="toolbar">
        <button id="boldBtn" class="toolbar-btn" title="Bold (Ctrl+B)">
          <strong>B</strong>
        </button>
        <button id="italicBtn" class="toolbar-btn" title="Italic (Ctrl+I)">
          <em>I</em>
        </button>
        <button id="strikeBtn" class="toolbar-btn" title="StrikeThrough">
          <s>S</s>
        </button>
      </div>
      <div id="editor" class="editor" contenteditable="true">
        <p>
          EduChunks Assignment. The editors are synchronized. Try typing in one
          editor and see the changes reflected in the other editor.
        </p>
      </div>
      <div id="syncStatus" class="sync-status">Synced</div>
    </div>

    <script src="../js/editor.js"></script>
  </body>
</html>
