      <h1 class="page-intro__eyebrow">Real-time Editor Sync</h1>
      <p class="page-intro__subheading">
        Editors A and B are communicating via the host page using the
        postMessage API. Try typing in one of the editors and see the changes

      </p>

    <div class="main-container">
